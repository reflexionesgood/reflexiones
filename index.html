
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palabras Good</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="hero">
  <img src="assets/logo.png" alt="Logo" class="logo">
  <h1>Palabras Good</h1>
  <p>Frases bíblicas, reflexiones y mensajes de esperanza</p>
</header>

<section class="verse-section">
  <h2>Versículo del Día</h2>
  <div id="verse-box">Cargando versículo...</div>
</section>

<section class="videos-section">
  <h2>Videos Bíblicos</h2>

  <div class="video-grid">
    <div class="video-card">
      <div class="video-wrapper">
        <div class="video-overlay" onclick="openAd(this)"></div>
        <video controls preload="metadata">
          <source src="assets/video1.mp4" type="video/mp4">
        </video>
      </div>
    </div>

    <div class="video-card">
      <div class="video-wrapper">
        <div class="video-overlay" onclick="openAd(this)"></div>
        <video controls preload="metadata">
          <source src="assets/video2.mp4" type="video/mp4">
        </video>
      </div>
    </div>
  </div>
</section>

<section class="contact-section">
  <h2>Contacto y Redes Sociales</h2>
  <div class="social-links">
    <a href="https://web.facebook.com/palabrasgood" target="_blank">Facebook</a>
    <a href="https://www.tiktok.com/@palabras_good" target="_blank">TikTok</a>
    <a href="https://www.youtube.com/@SecretosBiblico" target="_blank">YouTube</a>
  </div>
</section>

<footer>
  <p>© 2026 Palabras Good — Dios te bendiga</p>
</footer>

<script src="js/script.js"></script>
</body>
</html>
